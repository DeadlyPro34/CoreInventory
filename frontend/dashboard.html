<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreInventory | Operations Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/tailwind.config.js"></script>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="bg-theme-light text-theme-gray font-sans antialiased min-h-screen flex flex-col">

    <!-- 1. Top Navigation Menu -->
    <nav class="glass-panel sticky top-0 z-50 w-full">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                
                <!-- Logo & Main Nav -->
                <div class="flex items-center gap-8">
                    <!-- Mobile Menu Button -->
                    <button id="mobile-menu-toggle" class="md:hidden text-theme-gray hover:text-theme-primary transition-colors">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>

                    <div class="flex-shrink-0 cursor-pointer" onclick="navigate('dashboard')">
                        <h1 class="text-xl font-bold text-theme-dark flex items-center gap-2">
                            <i data-lucide="boxes" class="text-theme-primary w-6 h-6"></i>
                            <span class="hidden xs:block">CoreInventory</span>
                        </h1>
                    </div>
                    
                    <div class="hidden md:block">
                        <div class="flex items-center space-x-2">
                            <!-- Dashboard -->
                            <button onclick="navigate('dashboard')" class="nav-btn flex items-center gap-2 px-3 py-2 rounded-md text-sm font-medium text-theme-gray hover:bg-theme-light hover:text-theme-primary transition-colors" data-route="dashboard">
                                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
                            </button>

                            <!-- Operations Dropdown -->
                            <div class="relative dropdown-container">
                                <button class="dropdown-trigger flex items-center gap-2 px-3 py-2 rounded-md text-sm font-medium text-theme-gray hover:bg-theme-light hover:text-theme-primary transition-colors">
                                    <i data-lucide="arrow-right-left" class="w-4 h-4"></i> Operations
                                    <i data-lucide="chevron-down" class="w-3 h-3 ml-1 opacity-70 transition-transform duration-200"></i>
                                </button>
                                <div class="dropdown-content absolute left-0 mt-1 w-48 rounded-md shadow-lg bg-theme-white ring-1 ring-theme-secondary z-50 overflow-hidden">
                                    <div class="py-1">
                                        <a href="javascript:void(0)" onclick="navigate('receipts')" class="block px-4 py-2 text-sm text-theme-gray hover:bg-theme-light hover:text-theme-primary"><i data-lucide="download" class="w-4 h-4 inline mr-2 text-theme-primary"></i> Receipts</a>
                                        <a href="javascript:void(0)" onclick="navigate('deliveries')" class="block px-4 py-2 text-sm text-theme-gray hover:bg-theme-light hover:text-theme-primary"><i data-lucide="upload" class="w-4 h-4 inline mr-2 text-theme-dark"></i> Delivery</a>
                                        <a href="javascript:void(0)" onclick="navigate('adjustments')" class="block px-4 py-2 text-sm text-theme-gray hover:bg-theme-light hover:text-theme-primary"><i data-lucide="sliders-horizontal" class="w-4 h-4 inline mr-2 text-theme-gray"></i> Adjustment</a>
                                    </div>
                                </div>
                            </div>

                            <!-- Stock -->
                            <button onclick="navigate('stock')" class="nav-btn flex items-center gap-2 px-3 py-2 rounded-md text-sm font-medium text-theme-gray hover:bg-theme-light hover:text-theme-primary transition-colors" data-route="stock">
                                <i data-lucide="package" class="w-4 h-4"></i> Stock
                            </button>

                            <!-- Move History -->
                            <button onclick="navigate('history')" class="nav-btn flex items-center gap-2 px-3 py-2 rounded-md text-sm font-medium text-theme-gray hover:bg-theme-light hover:text-theme-primary transition-colors" data-route="history">
                                <i data-lucide="history" class="w-4 h-4"></i> Move History
                            </button>

                            <!-- Settings Dropdown -->
                            <div class="relative dropdown-container">
                                <button class="dropdown-trigger flex items-center gap-2 px-3 py-2 rounded-md text-sm font-medium text-theme-gray hover:bg-theme-light hover:text-theme-primary transition-colors">
                                    <i data-lucide="settings" class="w-4 h-4"></i> Settings
                                    <i data-lucide="chevron-down" class="w-3 h-3 ml-1 opacity-70 transition-transform duration-200"></i>
                                </button>
                                <div class="dropdown-content absolute left-0 mt-1 w-56 rounded-md shadow-lg bg-theme-white ring-1 ring-theme-secondary z-50 overflow-hidden">
                                    <div class="px-4 py-2 border-b border-theme-secondary text-xs uppercase tracking-wider text-theme-dark font-bold bg-theme-light/50">Infrastructure</div>
                                    <div class="py-1">
                                        <a href="javascript:void(0)" onclick="navigate('warehouses')" class="block px-4 py-2 text-sm text-theme-gray hover:bg-theme-light hover:text-theme-primary"><i data-lucide="warehouse" class="w-4 h-4 inline mr-2 text-theme-gray"></i> Warehouse</a>
                                        <a href="javascript:void(0)" onclick="navigate('locations')" class="block px-4 py-2 text-sm text-theme-gray hover:bg-theme-light hover:text-theme-primary"><i data-lucide="map-pin" class="w-4 h-4 inline mr-2 text-theme-gray"></i> Locations</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- User Profile -->
                <div class="flex items-center gap-4">
                    <button class="text-theme-gray hover:text-theme-primary transition-colors">
                        <i data-lucide="bell" class="w-5 h-5"></i>
                    </button>
                    <div class="w-8 h-8 rounded-full bg-theme-primary flex items-center justify-center font-bold text-sm text-theme-white shadow-md cursor-pointer ring-2 ring-theme-secondary hover:bg-theme-dark transition-colors">
                        A
                    </div>
                </div>

            </div>
        </div>
    </nav>
    
    <!-- Mobile Sidebar -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <div id="mobile-sidebar" class="mobile-sidebar p-6">
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-2 text-theme-dark">
                <i data-lucide="boxes" class="text-theme-primary w-6 h-6"></i>
                <span class="font-bold text-xl tracking-tight">CoreInventory</span>
            </div>
            <button id="close-sidebar" class="text-theme-gray hover:text-theme-primary transition-colors">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>

        <div class="flex flex-col space-y-2">
            <a href="javascript:void(0)" onclick="navigate('dashboard'); toggleMobileMenu(false)" class="mobile-nav-link">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </a>
            <div class="pt-4 pb-2 text-xs font-bold text-theme-gray uppercase tracking-wider">Operations</div>
            <a href="javascript:void(0)" onclick="navigate('receipts'); toggleMobileMenu(false)" class="mobile-nav-link">
                <i data-lucide="download" class="w-5 h-5"></i> Receipts
            </a>
            <a href="javascript:void(0)" onclick="navigate('deliveries'); toggleMobileMenu(false)" class="mobile-nav-link">
                <i data-lucide="upload" class="w-5 h-5"></i> Delivery
            </a>
            <a href="javascript:void(0)" onclick="navigate('stock'); toggleMobileMenu(false)" class="mobile-nav-link">
                <i data-lucide="package" class="w-5 h-5"></i> Stock
            </a>
            <a href="javascript:void(0)" onclick="navigate('history'); toggleMobileMenu(false)" class="mobile-nav-link">
                <i data-lucide="history" class="w-5 h-5"></i> Move History
            </a>
            <div class="pt-4 pb-2 text-xs font-bold text-theme-gray uppercase tracking-wider">Infrastructure</div>
            <a href="javascript:void(0)" onclick="navigate('warehouses'); toggleMobileMenu(false)" class="mobile-nav-link">
                <i data-lucide="warehouse" class="w-5 h-5"></i> Warehouse
            </a>
            <a href="javascript:void(0)" onclick="navigate('locations'); toggleMobileMenu(false)" class="mobile-nav-link">
                <i data-lucide="map-pin" class="w-5 h-5"></i> Locations
            </a>
        </div>
    </div>

    <!-- Main Content Area -->
    <main class="flex-grow p-6 md:p-8 max-w-7xl mx-auto w-full">
        <!-- Dynamic Content Injected Here -->
        <div id="app-container"></div>
    </main>

    <!-- Footer -->
    <footer class="footer mt-auto">
        <div class="footer-content">
            <div class="footer-text">
                &copy; 2026 CoreInventory. All rights reserved.
            </div>
            <div class="footer-links">
                <a href="#" class="footer-link">Documentation</a>
                <a href="#" class="footer-link">Support</a>
                <a href="#" class="footer-link">Privacy Policy</a>
            </div>
        </div>
    </footer>

    <!-- JavaScript Application Logic -->
    <script src="js/transitions.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
