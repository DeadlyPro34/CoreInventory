<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreInventory | Location Configuration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/locations.css">
</head>
<body class="min-h-screen">

    <!-- Navigation Bar with Settings Dropdown -->
    <nav class="glass-nav sticky top-0 z-50 px-6 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-8">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-[#4F46E5] rounded-lg flex items-center justify-center text-white shadow-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                    </div>
                    <span class="font-bold text-xl tracking-tight text-[#312E81]">CoreInventory</span>
                </div>
                
                <div class="hidden md:flex items-center gap-1">
                    <a href="#" class="px-4 py-2 text-sm font-medium text-slate-500 hover:text-[#4F46E5] transition-colors">Dashboard</a>
                    <a href="#" class="px-4 py-2 text-sm font-medium text-slate-500 hover:text-[#4F46E5] transition-colors">Operations</a>
                    <a href="products.html" class="px-4 py-2 text-sm font-medium text-slate-500 hover:text-[#4F46E5] transition-colors">Products</a>
                    <a href="#" class="px-4 py-2 text-sm font-medium text-slate-500 hover:text-[#4F46E5] transition-colors">Move History</a>
                    
                    <!-- Dropdown Menu -->
                    <div class="relative group">
                        <button class="px-4 py-2 text-sm font-bold text-[#4F46E5] bg-indigo-50 rounded-lg flex items-center gap-1">
                            Settings
                            <svg class="w-4 h-4 transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                        <div class="dropdown-content absolute left-0 mt-2 w-48 bg-white border border-slate-100 rounded-2xl shadow-xl overflow-hidden z-[60]">
                            <a href="warehouse.html" class="block px-5 py-3 text-sm text-slate-600 hover:bg-indigo-50 hover:text-[#4F46E5] transition-colors">Warehouse</a>
                            <a href="locations.html" class="block px-5 py-3 text-sm font-bold text-[#4F46E5] bg-indigo-50/50">Locations</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="w-9 h-9 bg-[#C4B5FD] rounded-full border-2 border-white shadow-sm cursor-pointer hover:opacity-80 transition-opacity"></div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-6 py-12">
        
        <div class="mb-10 flex items-center gap-4 animate-slide-in">
            <div class="p-3 bg-white rounded-2xl shadow-sm border border-slate-100 text-[#4F46E5]">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </div>
            <div>
                <h1 class="text-3xl font-bold text-[#312E81]">Locations</h1>
                <p class="text-slate-500 text-sm">Define specific aisles, shelves, or zones within your warehouses.</p>
            </div>
        </div>

        <!-- Location Card Form -->
        <div class="bg-white rounded-[2.5rem] shadow-2xl border border-slate-50 overflow-hidden animate-slide-in" style="animation-delay: 0.1s;">
            <div class="p-8 md:p-12">
                <form id="locationForm" class="space-y-8">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <!-- Location Name -->
                        <div class="space-y-2">
                            <label class="text-xs font-bold uppercase tracking-widest text-slate-400 ml-1">Location Name</label>
                            <input type="text" id="loc_name" placeholder="e.g. Aisle 3 Electronics" 
                                class="w-full px-6 py-4 rounded-2xl bg-slate-50 config-input text-slate-800 font-medium" required>
                        </div>

                        <!-- Short Code -->
                        <div class="space-y-2">
                            <label class="text-xs font-bold uppercase tracking-widest text-slate-400 ml-1">Short Code</label>
                            <input type="text" id="loc_code" placeholder="A3-EL" 
                                class="w-full px-6 py-4 rounded-2xl bg-slate-50 config-input text-slate-800 font-bold uppercase" required>
                        </div>
                    </div>

                    <!-- Warehouse Selection -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-400 ml-1">Assign to Warehouse</label>
                        <select id="loc_warehouse" class="w-full px-6 py-4 rounded-2xl bg-slate-50 config-input text-slate-800 font-medium cursor-pointer" required>
                            <option value="" disabled selected>Select a warehouse...</option>
                            <option value="central">Central Hub North (CHN-01)</option>
                            <option value="south">Southern Distribution (SD-04)</option>
                            <option value="east">East Docking (ED-12)</option>
                        </select>
                    </div>

                    <!-- Actions -->
                    <div class="flex flex-col sm:flex-row gap-4 pt-4">
                        <button type="submit" class="flex-1 py-4 bg-[#4F46E5] hover:bg-[#312E81] text-white rounded-2xl font-bold transition-all shadow-lg shadow-indigo-100 flex items-center justify-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                            Save Location
                        </button>
                        <button type="button" id="updateBtn" class="flex-1 py-4 border-2 border-[#C4B5FD] text-[#4F46E5] hover:bg-indigo-50 rounded-2xl font-bold transition-all flex items-center justify-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            Update Location
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Notification Toast -->
        <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl text-sm font-bold shadow-2xl opacity-0 translate-y-10 transition-all pointer-events-none z-[100] flex items-center gap-3">
            <div class="w-6 h-6 bg-indigo-500 rounded-full flex items-center justify-center">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <span id="toastMsg">Location configured!</span>
        </div>
    </main>

    <script src="../js/locations.js"></script>
</body>
</html>
