<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreInventory | WH/IN/0001</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
        .input-group:focus-within label { color: #4F46E5; }
        .input-box { border-bottom: 2px solid #E2E8F0; transition: border-color 0.3s; }
        .input-box:focus { border-color: #4F46E5; outline: none; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-white border-b border-slate-200 px-8 py-4 flex items-center gap-3 text-sm font-semibold">
        <a href="receipts.html" class="text-indigo-600 hover:underline">Receipts</a>
        <span class="text-slate-300">/</span>
        <span class="text-slate-900">WH/IN/0001</span>
    </nav>

    <main class="max-w-5xl mx-auto mt-8 mb-12">
        <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/60 border border-slate-200 overflow-hidden">
            
            <div class="px-8 py-4 bg-slate-50/50 border-b border-slate-100 flex justify-between items-center">
                <div class="flex gap-2">
                    <button class="px-6 py-2 bg-indigo-600 text-white text-xs font-bold rounded-xl shadow-md hover:bg-indigo-700 transition-all">Validate</button>
                    <button class="px-6 py-2 border border-slate-200 bg-white text-slate-600 text-xs font-bold rounded-xl hover:bg-slate-50 transition-all">Print</button>
                    <button class="px-6 py-2 text-rose-600 text-xs font-bold hover:bg-rose-50 rounded-xl transition-all">Cancel</button>
                </div>
                
                <div class="flex items-center gap-4 text-[10px] font-black uppercase tracking-widest">
                    <span class="text-indigo-600 border-b-2 border-indigo-600 pb-1">Draft</span>
                    <span class="text-slate-300">Ready</span>
                    <span class="text-slate-300">Done</span>
                </div>
            </div>

            <div class="p-12">
                <div class="mb-12">
                    <span class="text-indigo-600 font-bold text-xs uppercase tracking-widest">Standard Receipt</span>
                    <h1 class="text-4xl font-extrabold text-slate-900 mt-2">WH/IN/0001</h1>
                </div>
                
                <div class="grid grid-cols-2 gap-x-20 gap-y-12 mb-16">
                    <div class="input-group">
                        <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-tighter mb-1">Receive From</label>
                        <input type="text" value="Azure Interior" class="w-full input-box py-2 font-semibold text-slate-700">
                    </div>
                    <div class="input-group">
                        <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-tighter mb-1">Scheduled Date</label>
                        <input type="date" value="2026-03-14" class="w-full input-box py-2 font-semibold text-slate-700">
                    </div>
                    <div class="input-group">
                        <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-tighter mb-1">Responsible</label>
                        <input type="text" value="Administrator" readonly class="w-full py-2 font-semibold text-slate-400 cursor-not-allowed">
                    </div>
                </div>

                <div>
                    <h2 class="text-sm font-bold text-slate-900 border-b-2 border-indigo-600 inline-block pb-1 mb-6">Operations</h2>
                    <div class="bg-slate-50 rounded-2xl p-6 border border-slate-100">
                        <table class="w-full text-left text-sm">
                            <thead>
                                <tr class="text-slate-400 font-bold text-[10px] uppercase tracking-wider border-b border-slate-200">
                                    <th class="pb-4">Product</th>
                                    <th class="pb-4 text-right">Demand</th>
                                    <th class="pb-4 text-right">Done</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-200">
                                <tr>
                                    <td class="py-5">
                                        <div class="font-bold text-slate-900">[DESK001] Office Desk</div>
                                        <div class="text-xs text-slate-400">Large / Walnut</div>
                                    </td>
                                    <td class="py-5 text-right font-mono text-slate-600">6.00</td>
                                    <td class="py-5 text-right font-mono text-indigo-600 font-bold">6.00</td>
                                </tr>
                                <tr>
                                    <td colspan="3" class="pt-6">
                                        <button class="text-indigo-600 font-bold text-xs hover:underline">+ Add a product</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
