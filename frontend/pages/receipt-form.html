<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreInventory | Edit Receipt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --bg-lavender: #F8FAFC;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #F1F5F9;
            color: #1E293B;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }

        /* Status Pipeline Breadcrumbs */
        .pipeline-container {
            display: flex;
            background: #E2E8F0;
            border-radius: 12px;
            overflow: hidden;
            padding: 4px;
            gap: 4px;
        }

        .pipeline-step {
            flex: 1;
            text-align: center;
            padding: 10px 16px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748B;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .pipeline-step.active {
            background: white;
            color: #4F46E5;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .pipeline-step.done {
            color: #4338ca;
        }

        /* Form Styling */
        .form-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            border: 1px solid #E2E8F0;
        }

        .form-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            color: #94A3B8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
            padding-left: 4px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background-color: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 500;
            color: #1E293B;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-input:focus {
            background-color: white;
            border-color: #4F46E5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .form-input:read-only {
            background-color: #F1F5F9;
            color: #64748B;
            cursor: not-allowed;
        }

        .table-header {
            font-size: 0.7rem;
            font-weight: 700;
            color: #94A3B8;
            text-transform: uppercase;
            padding: 16px 24px;
            border-bottom: 1px solid #F1F5F9;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Navigation Bar -->
    <nav class="glass-nav sticky top-0 z-50 px-6 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-8">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-[#4F46E5] rounded-lg flex items-center justify-center text-white shadow-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                    </div>
                    <span class="font-bold text-xl tracking-tight text-[#1E293B]">CoreInventory</span>
                </div>
                
                <div class="hidden md:flex items-center gap-1 text-sm font-semibold">
                    <a href="receipts.html" class="px-4 py-2 text-indigo-600 hover:text-[#4F46E5]">Receipts</a>
                    <span class="text-slate-300">/</span>
                    <span class="px-2 py-2 text-slate-900">WH/IN/0001</span>
                </div>
            </div>
            <div class="w-9 h-9 bg-[#C4B5FD] rounded-full border-2 border-white shadow-sm"></div>
        </div>
    </nav>

    <!-- Header Actions -->
    <header class="max-w-6xl mx-auto px-6 pt-10 animate-fade">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
            <div class="flex items-center gap-3">
                <button id="validateBtn" class="px-8 py-3 bg-[#4F46E5] text-white rounded-xl font-bold shadow-lg hover:bg-[#4338ca] transition-all">VALIDATE</button>
                <button class="px-6 py-3 bg-white border border-slate-200 text-slate-600 rounded-xl font-bold hover:bg-slate-50 transition-all">PRINT</button>
                <button class="px-6 py-3 text-slate-400 font-bold hover:text-red-500 transition-all">CANCEL</button>
            </div>

            <!-- Pipeline -->
            <div class="pipeline-container w-full md:w-auto min-w-[400px]">
                <div class="pipeline-step active">Draft</div>
                <div class="pipeline-step">Waiting</div>
                <div class="pipeline-step">Ready</div>
                <div class="pipeline-step">Done</div>
            </div>
        </div>

        <div class="flex items-baseline gap-4">
            <h1 class="text-4xl font-extrabold tracking-tight text-[#1E293B]">Incoming Receipt</h1>
            <span class="text-lg font-medium text-slate-400">#WH/IN/0001</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 mt-8 animate-fade">
        <!-- Information Card -->
        <div class="form-card p-8 md:p-12">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                <!-- Left Column -->
                <div class="space-y-8">
                    <div>
                        <label class="form-label">Receive From</label>
                        <input type="text" value="Azure Interior" class="form-input" placeholder="Vendor name...">
                    </div>
                    <div>
                        <label class="form-label">Operation Type</label>
                        <select class="form-input appearance-none bg-[url('data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2F2020%2Fsvg%22%20fill%3D%22none%22%20viewBox%3D%220%200%2024%2024%22%20stroke%3D%22%2364748b%22%3E%3Cpath%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%20stroke-width%3D%222%22%20d%3D%22M19%209l-7%207-7-7%22%2F%3E%3C%2Fsvg%3E')] bg-[length:1em] bg-[right_1rem_center] bg-no-repeat">
                            <option>Receipt</option>
                            <option>Return</option>
                        </select>
                    </div>
                </div>

                <!-- Right Column -->
                <div class="space-y-8">
                    <div>
                        <label class="form-label">Scheduled Date</label>
                        <input type="datetime-local" class="form-input" value="2026-03-14T10:00">
                    </div>
                    <div>
                        <label class="form-label">Responsible</label>
                        <input type="text" value="Administrator" readonly class="form-input">
                    </div>
                </div>
            </div>

            <div class="h-px bg-slate-100 my-12"></div>

            <!-- Products Table Section -->
            <div class="space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold text-[#1E293B]">Operations</h2>
                    <span class="px-3 py-1 bg-slate-100 rounded-full text-[10px] font-bold text-slate-500 uppercase">Demand vs Received</span>
                </div>

                <div class="overflow-hidden rounded-2xl border border-slate-200">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="table-header">Product</th>
                                <th class="table-header w-32 text-right">Demand</th>
                                <th class="table-header w-32 text-right">Done</th>
                                <th class="table-header w-20"></th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100" id="productBody">
                            <tr class="group hover:bg-indigo-50/30 transition-colors">
                                <td class="px-6 py-5">
                                    <div class="font-bold text-slate-800">[DESK001] Office Desk</div>
                                    <div class="text-xs text-slate-400">Large / Walnut</div>
                                </td>
                                <td class="px-6 py-5 text-right font-mono text-slate-600">6.00</td>
                                <td class="px-6 py-5 text-right">
                                    <input type="number" value="6.00" class="w-24 text-right bg-white border border-slate-200 rounded-lg px-2 py-1 font-bold text-indigo-600 focus:ring-2 focus:ring-indigo-100 outline-none transition-all">
                                </td>
                                <td class="px-6 py-5 text-right">
                                    <button onclick="this.closest('tr').remove()" class="p-2 text-slate-300 hover:text-red-500 transition-all">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                        <tfoot class="bg-slate-50/50 border-t border-slate-100">
                            <tr>
                                <td colspan="4" class="px-6 py-4">
                                    <button id="addProdBtn" class="text-indigo-600 font-bold text-xs hover:underline flex items-center gap-1">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                                        ADD A PRODUCT
                                    </button>
                                </td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Success Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-[#1E293B] text-white px-8 py-4 rounded-2xl text-sm font-bold shadow-2xl opacity-0 translate-y-10 transition-all pointer-events-none z-[200] flex items-center gap-4">
        <div class="w-8 h-8 bg-emerald-500 rounded-full flex items-center justify-center flex-shrink-0 shadow-lg shadow-emerald-500/20">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <span id="toastMsg">Action completed successfully.</span>
    </div>

    <script>
        document.getElementById('validateBtn').addEventListener('click', () => {
            const btn = document.getElementById('validateBtn');
            btn.innerHTML = 'PROCESSING...';
            btn.disabled = true;

            setTimeout(() => {
                const toast = document.getElementById('toast');
                document.getElementById('toastMsg').textContent = "Receipt WH/IN/0001 validated successfully.";
                toast.style.opacity = '1';
                toast.style.transform = 'translateY(0) translateX(-50%)';
                
                btn.innerHTML = 'VALIDATE';
                btn.disabled = false;

                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateY(40px) translateX(-50%)';
                }, 3000);
            }, 1000);
        });
    </script>
</body>
</html>
