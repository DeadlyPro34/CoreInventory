<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreInventory - Move History</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/history.css">
</head>

<body class="bg-violet-50 font-sans text-gray-700 h-screen flex flex-col overflow-hidden">

    <!-- 1. Navigation -->
    <nav class="bg-indigo-900 text-white flex-shrink-0 shadow-md relative z-20">
        <div class="px-6 h-16 flex justify-between items-center">
            <div class="flex items-center space-x-10">
                <!-- Logo -->
                <div class="flex items-center gap-2">
                    <i data-lucide="boxes" class="text-indigo-400"></i>
                    <span class="text-xl font-bold tracking-tight text-white">Core<span
                            class="text-indigo-400">Inventory</span></span>
                </div>
                <!-- Nav Links -->
                <div class="hidden md:flex space-x-1 h-16">
                    <a href="#"
                        class="px-4 flex items-center text-sm font-medium text-violet-300 hover:text-white hover:bg-indigo-800 transition">Dashboard</a>
                    <a href="#"
                        class="px-4 flex items-center text-sm font-medium text-violet-300 hover:text-white hover:bg-indigo-800 transition">Operations</a>
                    <a href="#"
                        class="px-4 flex items-center text-sm font-medium text-violet-300 hover:text-white hover:bg-indigo-800 transition">Products</a>
                    <a href="#"
                        class="px-4 flex items-center text-sm font-medium text-white border-b-2 border-indigo-500 bg-indigo-800/50">Move
                        History</a>
                    <a href="#"
                        class="px-4 flex items-center text-sm font-medium text-violet-300 hover:text-white hover:bg-indigo-800 transition">Settings</a>
                </div>
            </div>
            <!-- User Profile -->
            <button
                class="w-9 h-9 rounded-full bg-indigo-800 flex items-center justify-center hover:bg-indigo-700 transition focus:ring-2 focus:ring-indigo-400 focus:outline-none">
                <i data-lucide="user" class="w-5 h-5 text-violet-200"></i>
            </button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-auto p-6 lg:p-8 flex flex-col gap-6">

        <!-- 2. Header & Controls -->
        <header
            class="flex flex-col gap-4 md:flex-row md:items-center justify-between bg-white p-4 rounded-xl shadow-sm border border-violet-200 flex-shrink-0">
            <div class="flex items-center gap-4">
                <button
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium text-sm transition shadow-sm flex items-center gap-2">
                    <i data-lucide="plus" class="w-4 h-4"></i> NEW
                </button>
                <div class="h-8 w-px bg-violet-200 hidden md:block"></div>
                <div>
                    <h1 class="text-xl font-bold text-gray-900 leading-tight">Move History</h1>
                    <p class="text-xs text-gray-500 font-medium">Unified Stock Ledger</p>
                </div>
            </div>

            <div class="flex items-center gap-3 w-full md:w-auto">
                <!-- Search Bar -->
                <div class="relative flex-1 md:w-80">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                    <input type="text" id="searchInput" placeholder="Search Reference or Contact..."
                        class="w-full pl-9 pr-4 py-2 bg-violet-50/50 border border-violet-200 rounded-lg text-sm focus:bg-white focus:ring-2 focus:ring-indigo-600 focus:border-transparent outline-none transition">
                </div>

                <!-- View Switcher -->
                <div class="flex bg-violet-100/50 p-1 rounded-lg border border-violet-200">
                    <button id="btnListView" class="p-1.5 rounded-md text-indigo-600 bg-white shadow-sm transition"
                        title="List View">
                        <i data-lucide="list" class="w-4 h-4"></i>
                    </button>
                    <button id="btnKanbanView" class="p-1.5 rounded-md text-gray-500 hover:text-gray-700 transition"
                        title="Kanban View">
                        <i data-lucide="kanban" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Container -->
        <div id="viewContainer" class="flex-1 fade-in relative min-h-0 flex flex-col">
            <!-- Content injected via JS -->
        </div>

    </main>

    <script src="../js/history.js"></script>
</body>

</html>
