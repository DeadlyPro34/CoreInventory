<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreInventory | Edit Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --bg-lavender: #F8FAFC;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #F1F5F9;
            color: #1E293B;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }

        .dropdown-content {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.2s ease;
        }
        .group:hover .dropdown-content {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* Status Pipeline Breadcrumbs - Refined */
        .pipeline-container {
            display: flex;
            background: #E2E8F0;
            border-radius: 12px;
            overflow: hidden;
            padding: 4px;
            gap: 4px;
        }

        .pipeline-step {
            flex: 1;
            text-align: center;
            padding: 10px 16px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748B;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .pipeline-step.active {
            background: white;
            color: #4F46E5;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .pipeline-step.done {
            color: #4338ca;
        }

        /* Form Styling - Enhanced */
        .form-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            border: 1px solid #E2E8F0;
        }

        .form-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            color: #94A3B8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
            padding-left: 4px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background-color: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 500;
            color: #1E293B;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-input:focus {
            background-color: white;
            border-color: #4F46E5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .form-input:read-only {
            background-color: #F1F5F9;
            color: #64748B;
            cursor: not-allowed;
        }

        .table-header {
            font-size: 0.7rem;
            font-weight: 700;
            color: #94A3B8;
            text-transform: uppercase;
            padding: 16px 24px;
            border-bottom: 1px solid #F1F5F9;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Navigation Bar -->
    <nav class="glass-nav sticky top-0 z-50 px-6 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-8">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-[#4F46E5] rounded-lg flex items-center justify-center text-white shadow-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                    </div>
                    <span class="font-bold text-xl tracking-tight text-[#1E293B]">CoreInventory</span>
                </div>
                
                <div class="hidden md:flex items-center gap-1">
                    <a href="#" class="px-4 py-2 text-sm font-medium text-slate-500 hover:text-[#4F46E5]">Dashboard</a>
                    <a href="#" class="px-4 py-2 text-sm font-bold text-[#4F46E5] bg-indigo-50/50 rounded-lg">Operations</a>
                    <a href="products.html" class="px-4 py-2 text-sm font-medium text-slate-500 hover:text-[#4F46E5]">Products</a>
                    <a href="#" class="px-4 py-2 text-sm font-medium text-slate-500 hover:text-[#4F46E5]">Move History</a>
                    
                    <div class="relative group">
                        <button class="px-4 py-2 text-sm font-medium text-slate-500 flex items-center gap-1 hover:text-[#4F46E5]">
                            Settings
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                        <div class="dropdown-content absolute left-0 mt-2 w-48 bg-white border border-slate-100 rounded-2xl shadow-xl overflow-hidden z-[60]">
                            <a href="warehouse.html" class="block px-5 py-3 text-sm text-slate-600 hover:bg-indigo-50 hover:text-[#4F46E5]">Warehouse</a>
                            <a href="locations.html" class="block px-5 py-3 text-sm text-slate-600 hover:bg-indigo-50 hover:text-[#4F46E5]">Locations</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="w-9 h-9 bg-[#C4B5FD] rounded-full border-2 border-white shadow-sm cursor-pointer"></div>
        </div>
    </nav>

    <!-- Header Actions -->
    <header class="max-w-6xl mx-auto px-6 pt-10 animate-fade">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
            <div class="flex items-center gap-3">
                <button id="validateBtn" class="px-8 py-3 bg-[#4F46E5] text-white rounded-xl font-bold shadow-lg shadow-indigo-100 hover:bg-[#4338ca] hover:-translate-y-0.5 transition-all">VALIDATE</button>
                <button class="px-6 py-3 bg-white border border-slate-200 text-slate-600 rounded-xl font-bold hover:bg-slate-50 transition-all">PRINT</button>
                <button class="px-6 py-3 text-slate-400 font-bold hover:text-red-500 transition-all">CANCEL</button>
            </div>

            <!-- Pipeline -->
            <div class="pipeline-container w-full md:w-auto min-w-[400px]">
                <div class="pipeline-step done">Draft</div>
                <div class="pipeline-step active">Waiting</div>
                <div class="pipeline-step">Ready</div>
                <div class="pipeline-step">Done</div>
            </div>
        </div>

        <div class="flex items-baseline gap-4">
            <h1 class="text-4xl font-extrabold tracking-tight text-[#1E293B]">Delivery Order</h1>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 mt-8 animate-fade" style="animation-delay: 0.1s;">
        <!-- Information Card -->
        <div class="form-card p-8 md:p-12">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                <!-- Left Column -->
                <div class="space-y-8">
                    <div>
                        <label class="form-label">Reference ID</label>
                        <div class="relative">
                            <input type="text" value="WH/OUT/0001" readonly class="form-input font-bold !bg-indigo-50/30 !border-indigo-100 !text-indigo-600">
                            <div class="absolute right-4 top-1/2 -translate-y-1/2 text-indigo-400">
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M7 9a2 2 0 012-2h6a2 2 0 012 2v6a2 2 0 01-2 2H9a2 2 0 01-2-2V9z"/><path d="M5 3a2 2 0 00-2 2v6a2 2 0 002 2V5h8a2 2 0 00-2-2H5z"/></svg>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="form-label">Delivery Address</label>
                        <textarea rows="4" class="form-input resize-none" placeholder="Street, Building, City, Zip Code..."></textarea>
                    </div>
                </div>

                <!-- Right Column -->
                <div class="space-y-8">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div>
                            <label class="form-label">Schedule Date</label>
                            <input type="datetime-local" class="form-input">
                        </div>
                        <div>
                            <label class="form-label">Operation Type</label>
                            <select class="form-input appearance-none bg-[url('data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2F2020%2Fsvg%22%20fill%3D%22none%22%20viewBox%3D%220%200%2024%2024%22%20stroke%3D%22%2364748b%22%3E%3Cpath%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%20stroke-width%3D%222%22%20d%3D%22M19%209l-7%207-7-7%22%2F%3E%3C%2Fsvg%3E')] bg-[length:1em] bg-[right_1rem_center] bg-no-repeat">
                                <option>Outbound Delivery</option>
                                <option>Internal Transfer</option>
                                <option>Drop Ship</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="form-label">Responsible Manager</label>
                        <div class="relative">
                            <input type="text" class="form-input pl-12" placeholder="Start typing name...">
                            <div class="absolute left-4 top-1/2 -translate-y-1/2 w-6 h-6 bg-slate-200 rounded-full flex items-center justify-center text-[10px] font-bold text-slate-500">?</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="h-px bg-slate-100 my-12"></div>

            <!-- Products Table Section -->
            <div class="space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold text-[#1E293B]">Product Line Items</h2>
                    <span class="px-3 py-1 bg-slate-100 rounded-full text-[10px] font-bold text-slate-500 uppercase">Total Items: <span id="itemCount">1</span></span>
                </div>

                <div class="overflow-hidden rounded-2xl border border-slate-200">
                    <table class="w-full text-left" id="productsTable">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="table-header">Product Description</th>
                                <th class="table-header w-40">Qty to Deliver</th>
                                <th class="table-header w-20"></th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100" id="productBody">
                            <!-- Existing Rows -->
                            <tr class="group hover:bg-indigo-50/30 transition-colors">
                                <td class="px-6 py-5 font-semibold text-slate-700">Acoustic Block Panel (60x60)</td>
                                <td class="px-6 py-5">
                                    <span class="px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-slate-800 font-bold text-sm">12.00 Units</span>
                                </td>
                                <td class="px-6 py-5 text-right">
                                    <button onclick="removeRow(this)" class="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                                </td>
                            </tr>
                        </tbody>
                        <tfoot class="bg-slate-50/50">
                            <tr>
                                <td class="px-6 py-4">
                                    <input type="text" id="addProdName" placeholder="Search product to add..." class="w-full bg-transparent outline-none text-sm font-medium placeholder:text-slate-400 border-b border-transparent focus:border-indigo-300 transition-all pb-1">
                                </td>
                                <td class="px-6 py-4">
                                    <input type="number" id="addProdQty" placeholder="0.00" class="w-full bg-transparent outline-none text-sm font-bold text-indigo-600 border-b border-transparent focus:border-indigo-300 transition-all pb-1">
                                </td>
                                <td class="px-6 py-4 text-right">
                                    <button id="addProdBtn" class="w-10 h-10 bg-[#4F46E5] text-white rounded-xl shadow-md hover:bg-[#4338ca] transition-all flex items-center justify-center">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
                                    </button>
                                </td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Success Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-[#1E293B] text-white px-8 py-4 rounded-2xl text-sm font-bold shadow-2xl opacity-0 translate-y-10 transition-all pointer-events-none z-[200] flex items-center gap-4">
        <div class="w-8 h-8 bg-emerald-500 rounded-full flex items-center justify-center flex-shrink-0 shadow-lg shadow-emerald-500/20">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <span id="toastMsg">Action completed successfully.</span>
    </div>

    <script>
        const addBtn = document.getElementById('addProdBtn');
        const prodNameInput = document.getElementById('addProdName');
        const prodQtyInput = document.getElementById('addProdQty');
        const tableBody = document.getElementById('productBody');
        const itemCountDisp = document.getElementById('itemCount');

        function updateCount() {
            itemCountDisp.textContent = tableBody.children.length;
        }

        function removeRow(btn) {
            btn.closest('tr').remove();
            updateCount();
        }

        function addNewRow() {
            const name = prodNameInput.value.trim();
            const qty = parseFloat(prodQtyInput.value);

            if (!name || isNaN(qty)) return;

            const row = document.createElement('tr');
            row.className = 'group hover:bg-indigo-50/30 transition-colors animate-fade';
            row.innerHTML = `
                <td class="px-6 py-5 font-semibold text-slate-700">${name}</td>
                <td class="px-6 py-5">
                    <span class="px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-slate-800 font-bold text-sm">${qty.toFixed(2)} Units</span>
                </td>
                <td class="px-6 py-5 text-right">
                    <button onclick="removeRow(this)" class="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                </td>
            `;
            tableBody.appendChild(row);

            prodNameInput.value = '';
            prodQtyInput.value = '';
            prodNameInput.focus();
            updateCount();
        }

        addBtn.addEventListener('click', addNewRow);
        prodQtyInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') addNewRow(); });

        document.getElementById('validateBtn').addEventListener('click', () => {
            const btn = document.getElementById('validateBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="flex items-center gap-2"><svg class="animate-spin h-4 w-4 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> PROCESSING...</span>';
            btn.disabled = true;

            setTimeout(() => {
                showToast("Order WH/OUT/0001 validated and moved to Ready.");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }, 1200);
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.style.opacity = '1';
            toast.style.transform = 'translateY(0) translateX(-50%)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(40px) translateX(-50%)';
            }, 3500);
        }
    </script>
</body>
</html>
